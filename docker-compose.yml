version: "3.8"

x-common-env: &common-env {}

services:
  postgres:
    image: postgres:15-alpine
    container_name: emailreader_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: emailreader
      POSTGRES_USER: emailreader_user
      POSTGRES_PASSWORD: emailreader_password
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailreader_user -d emailreader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emailreader_redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emailreader_beat
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery beat --loglevel=info --schedule /tmp/celerybeat-schedule
    env_file: .env
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emailreader_api
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *common-env
    ports: ["8000:8000"]
    volumes:
      - ./app:/app/app         # dev-only hot-reload
      - ./tests:/app/tests     # mount tests directory
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emailreader_worker
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery worker --loglevel=info -P eventlet -c 1000
    env_file: .env
    environment:
      <<: *common-env
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: