version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: emailreader_redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: emailreader_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: emailreader
      POSTGRES_PASSWORD: password
      POSTGRES_DB: emailreader_db
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailreader -d emailreader_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-test:
    image: postgres:15-alpine
    container_name: emailreader_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: emailreader_tester
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: emailreader_test_db
    ports: ["5433:5432"]
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailreader_tester -d emailreader_test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  moto:
    image: motoserver/moto:latest
    container_name: emailreader_moto
    ports:
      - "5002:5000"
    command: -H 0.0.0.0 # Listen on all interfaces

  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_beat
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_api
    restart: unless-stopped
    env_file:
      - .env
    ports: ["8000:8000"]
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_worker
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery worker --loglevel=info --pool=prefork -c 4
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # --- Test Runner Service (Updated) ---
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runtime
    container_name: emailreader_test_runner
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://emailreader_tester:securepassword@postgres-test:5432/emailreader_test_db
      - S3_BUCKET_NAME=emailreader-test-bucket
      - S3_ENDPOINT_URL=http://moto:5000
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy
      moto:
        condition: service_started
    # Run as root to solve pytest cache permission issues
    user: root

volumes:
  redis_data:
  postgres_data:
  postgres_test_data:
