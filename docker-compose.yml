# docker-compose.yml (Final Version)
version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: emailreader_redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      # Using the standard PING command for the healthcheck.
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: emailreader_postgres
    restart: unless-stopped
    environment:
      # These values are loaded from the .env file
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # This more explicit check ensures the service is ready for connections.
      test: ["CMD-SHELL", "pg_isready -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 5
    # ADDED: Production-ready logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_beat
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery beat --loglevel=info
    # All configuration is loaded from the .env file.
    env_file: .env
    volumes:
      - ./app:/app/app
      - celery_beat_data:/tmp
    depends_on:
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_api
    restart: unless-stopped
    # The .env file is the single source of truth for all environment variables.
    env_file: .env
    ports: ["8000:8000"]
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_worker
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery worker --loglevel=info -P eventlet -c 200
    env_file: .env
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Test Runner Service (Simplified)
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runtime
    container_name: emailreader_test_runner
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
    user: root

volumes:
  redis_data:
  postgres_data:
  celery_beat_data:
