version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: emailreader_redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - emailreader_network

  postgres:
    image: postgres:15-alpine
    container_name: emailreader_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: emailreader
      POSTGRES_PASSWORD: password
      POSTGRES_DB: emailreader_db
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailreader -d emailreader_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - emailreader_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: emailreader_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@emailreader.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - emailreader_network

  moto:
    image: motoserver/moto:latest
    container_name: emailreader_moto
    ports:
      - "5002:5000"
    command: -H 0.0.0.0 # Listen on all interfaces

  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_beat
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://emailreader:password@postgres:5432/emailreader_db
      - REDIS_URL=redis://redis:6379/0
    ports: ["8000:8000"]
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - emailreader_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: emailreader_worker
    restart: unless-stopped
    command: >
      celery -A app.celery_app.celery worker --loglevel=info --pool=prefork -c 4
    env_file:
      - .env
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  sqs_consumer:
    build:
      context: .
      dockerfile: sqs_consumer/Dockerfile
    container_name: emailreader_sqs_consumer
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./output:/app/output # Mount an output directory
    depends_on:
      - moto

  apply_worker:
    build:
      context: ./apply_worker
      dockerfile: Dockerfile
    container_name: emailreader_apply_worker
    restart: unless-stopped
    ports:
      - "5900:5900" # Expose VNC port
    env_file:
      - .env
    volumes:
      - ./files:/app/files
    depends_on:
      redis:
        condition: service_healthy
      moto:
        condition: service_started
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emailreader_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_USE_MOCKS=false
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  redis_data:
  postgres_data:
  pgadmin_data:

networks:
  emailreader_network:
    driver: bridge
