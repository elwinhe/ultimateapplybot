# docker-compose.prod.yml - Production override for RDS testing
version: "3.8"

services:
  # Override environment for production
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    env_file: .env.production
    
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    command: celery -A app.celery_app.celery worker --loglevel=info --pool=prefork -c 4
    env_file: .env.production
    
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    env_file: .env.production
    
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runtime
    env_file: .env.production
    # Remove dependency on local postgres
    depends_on: [] 