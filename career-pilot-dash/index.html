<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Ultimate Apply Bot - Automate Your Job Applications</title>
    <meta name="description" content="Streamline your job search with Ultimate Apply Bot. Automatically detect job opportunities from your emails and apply to positions on Ashby, Greenhouse, and Lever with intelligent automation." />
    <meta name="author" content="Ultimate Apply Bot" />
    <meta name="keywords" content="job application automation, career tools, job search, auto apply, job bot, recruitment automation" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://ultimateapplybot.com" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Ultimate Apply Bot - Automate Your Job Applications" />
    <meta property="og:description" content="Streamline your job search with intelligent automation. Connect your email and auto-apply to jobs on supported platforms." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ultimateapplybot.com" />
    <meta property="og:image" content="https://ultimateapplybot.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Ultimate Apply Bot" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ultimateapplybot" />
    <meta name="twitter:title" content="Ultimate Apply Bot - Automate Your Job Applications" />
    <meta name="twitter:description" content="Streamline your job search with intelligent automation. Connect your email and auto-apply to jobs on supported platforms." />
    <meta name="twitter:image" content="https://ultimateapplybot.com/og-image.jpg" />

    <!-- Structured Data for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Ultimate Apply Bot",
      "description": "Job application automation platform that helps users streamline their job search process",
      "url": "https://ultimateapplybot.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Ultimate Apply Bot"
      }
    }
    </script>

    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Preconnect to external domains for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
